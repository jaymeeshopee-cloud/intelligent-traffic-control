<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Intelligent Traffic Control Dashboard</title>
  <style>
    :root {
      --bg1: #06080f;
      --bg2: #0e1320;
      --card: rgba(255, 255, 255, 0.08);
      --card-strong: rgba(255, 255, 255, 0.12);
      --border: rgba(255, 255, 255, 0.16);
      --text: rgba(232, 239, 255, 0.92);
      --muted: rgba(232, 239, 255, 0.7);
      --accent: #39b7ff;
      --warn: #ffb470;
      --danger: #ff5a7a;
      --radius: 18px;
      --shadow: 0 18px 40px rgba(0, 0, 0, 0.55);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background: radial-gradient(circle at 20% 10%, rgba(57, 183, 255, 0.18), transparent 55%),
        linear-gradient(140deg, var(--bg1), var(--bg2));
      overflow-x: hidden;
    }

    header {
      padding: 18px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }

    header h1 {
      margin: 0;
      font-size: 1.2rem;
      letter-spacing: 0.05em;
    }

    header .subtitle {
      font-size: 0.85rem;
      color: var(--muted);
      margin-top: 6px;
    }

    main {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 18px;
      padding: 0 20px 20px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      backdrop-filter: blur(15px);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .dashboard {
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 18px;
    }

    .simulation {
      position: relative;
      display: grid;
      grid-template-columns: 1fr 240px;
      gap: 16px;
    }

    .sim-canvas {
      position: relative;
      border-radius: var(--radius);
      background: rgba(20, 30, 48, 0.55);
      border: 1px solid rgba(255, 255, 255, 0.16);
      height: 400px;
      overflow: hidden;
      display: grid;
      place-items: center;
      padding: 18px;
    }

    .control-panel {
      display: grid;
      gap: 12px;
    }

    .control-panel h2 {
      margin: 0 0 8px;
      font-size: 1rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      cursor: pointer;
      font-weight: 600;
      transition: transform 120ms ease, background 140ms ease;
    }

    .btn:hover {
      background: rgba(255, 255, 255, 0.12);
      transform: translateY(-1px);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #6be584);
      border: 1px solid rgba(255, 255, 255, 0.18);
      color: rgba(10, 20, 30, 0.92);
      box-shadow: 0 12px 24px rgba(57, 183, 255, 0.25);
    }

    .status {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .status span {
      font-size: 0.88rem;
    }

    .status .value {
      font-weight: 700;
      color: var(--accent);
    }

    .lights {
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-columns: 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 12px;
      padding: 16px;
      border-radius: var(--radius);
      border: 1px solid rgba(255, 255, 255, 0.16);
      background: rgba(0, 0, 0, 0.24);
    }

    .light-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 14px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    .light-group h3 {
      margin: 0;
      font-size: 0.95rem;
      letter-spacing: 0.02em;
      color: var(--text);
    }

    .traffic-light {
      width: 70px;
      padding: 12px;
      border-radius: 18px;
      background: rgba(0, 0, 0, 0.34);
      border: 1px solid rgba(255, 255, 255, 0.1);
      display: grid;
      gap: 10px;
      justify-items: center;
    }

    .lamp {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.12);
      box-shadow: inset 0 0 8px rgba(0, 0, 0, 0.35);
      transition: background 180ms ease, box-shadow 180ms ease;
    }

    .lamp.active {
      box-shadow: 0 0 18px rgba(255, 255, 255, 0.35);
    }

    .lamp.red.active {
      background: rgba(255, 90, 122, 0.95);
    }

    .lamp.yellow.active {
      background: rgba(255, 204, 87, 0.92);
    }

    .lamp.green.active {
      background: rgba(57, 183, 255, 0.92);
    }

    .logs {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .log-list {
      margin: 0;
      padding: 12px;
      list-style: none;
      overflow-y: auto;
      border-radius: 14px;
      background: rgba(0, 0, 0, 0.25);
      border: 1px solid rgba(255, 255, 255, 0.12);
      flex: 1;
    }

    .log-item {
      margin: 0 0 8px;
      font-size: 0.85rem;
      color: var(--muted);
      border-left: 3px solid rgba(57, 183, 255, 0.6);
      padding-left: 10px;
    }

    footer {
      padding: 18px 20px;
      text-align: center;
      font-size: 0.8rem;
      color: rgba(232, 239, 255, 0.65);
    }

    @media (max-width: 768px) {
      main {
        grid-template-columns: 1fr;
      }

      .simulation {
        grid-template-columns: 1fr;
      }

      .card.logs {
        order: 2;
      }

      .card.sim {
        order: 1;
      }

      .control-panel {
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .lights {
        grid-template-columns: 1fr;
      }

      .simulation {
        display: grid;
        grid-template-rows: auto auto;
      }

      .logs {
        margin-top: 16px;
      }
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>Intelligent Traffic Control</h1>
      <p class="subtitle">Glassmorphism dashboard · 2-way intersection state machine</p>
    </div>
    <button class="btn btn-primary" id="btnSwitch">Switch Lights</button>
  </header>

  <main>
    <section class="card sim">
      <div class="dashboard">
        <div class="simulation">
          <div class="sim-canvas" aria-label="Visual simulation">
            <div class="lights" id="lights">
              <div class="light-group" aria-label="North-South signal">
                <h3>North–South</h3>
                <div class="traffic-light" data-direction="ns">
                  <div class="lamp red" data-light="red"></div>
                  <div class="lamp yellow" data-light="yellow"></div>
                  <div class="lamp green" data-light="green"></div>
                </div>
              </div>
              <div class="light-group" aria-label="East-West signal">
                <h3>East–West</h3>
                <div class="traffic-light" data-direction="ew">
                  <div class="lamp red" data-light="red"></div>
                  <div class="lamp yellow" data-light="yellow"></div>
                  <div class="lamp green" data-light="green"></div>
                </div>
              </div>
            </div>
          </div>

          <div class="control-panel" aria-label="Simulation controls">
            <div class="status">
              <span>Current state:</span>
              <span class="value" id="currentState">Initializing…</span>
            </div>
            <div class="status">
              <span>Pending action:</span>
              <span class="value" id="pendingState">None</span>
            </div>
            <div class="status">
              <span>Last transition:</span>
              <span class="value" id="lastTransition">—</span>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section class="card logs">
      <h2>System Logs</h2>
      <div class="logs">
        <ol class="log-list" id="logList" aria-label="System log"></ol>
      </div>
    </section>
  </main>

  <footer>
    Built with vanilla HTML, CSS, and JS • Last update: <span id="footerTime"></span>
  </footer>

  <script>
    // ------------------------------------------------------------------
    // Utility helpers
    // ------------------------------------------------------------------
    const $ = (selector) => document.querySelector(selector);

    const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

    const formatTime = () => new Date().toLocaleTimeString([], {hour: "2-digit", minute: "2-digit", second: "2-digit"});

    // ------------------------------------------------------------------
    // State machine (trafficSystem)
    // ------------------------------------------------------------------
    const trafficSystem = {
      // Intersection states: "green" | "yellow" | "red"
      intersections: {
        ns: { name: "North–South", state: "green" },
        ew: { name: "East–West", state: "red" },
      },
      isTransitioning: false, // ensures we don't start a second transition while one is already running
      pendingSwitch: false, // if user requests a switch during transition, we enqueue one
      logs: [],
      lastTransition: "Never",
    };

    // ------------------------------------------------------------------
    // updateUI(): Render the UI based on trafficSystem state
    // ------------------------------------------------------------------
    function updateUI() {
      // CONTROL FLOW: Called whenever the state changes. This function is synchronous
      // and runs on the main thread (UI thread). It uses querySelector and classList
      // to update DOM state without rebuilding the whole tree.

      const currentStateLabel = $("#currentState");
      const pendingLabel = $("#pendingState");
      const transitionLabel = $("#lastTransition");

      const nsState = trafficSystem.intersections.ns.state;
      const ewState = trafficSystem.intersections.ew.state;

      currentStateLabel.textContent = `NS: ${nsState.toUpperCase()} / EW: ${ewState.toUpperCase()}`;
      pendingLabel.textContent = trafficSystem.pendingSwitch ? "Queued" : "None";
      transitionLabel.textContent = trafficSystem.lastTransition;
      $("#footerTime").textContent = formatTime();

      // Update traffic light visuals
      ["ns", "ew"].forEach((dir) => {
        const light = $(`.traffic-light[data-direction="${dir}"]`);
        if (!light) return;
        const state = trafficSystem.intersections[dir].state;

        // For each lamp, toggle the "active" class depending on state.
        light.querySelectorAll(".lamp").forEach((lamp) => {
          const lampType = lamp.dataset.light;
          lamp.classList.toggle("active", lampType === state);
        });
      });
    }

    // ------------------------------------------------------------------
    // logEvent(): Append a system log and update the log list
    // ------------------------------------------------------------------
    function logEvent(message) {
      // The event loop will execute this function synchronously. It must be fast
      // so the UI doesn't drop frames. We create a small log array and trim it.
      const timestamp = formatTime();
      const entry = `${timestamp} — ${message}`;
      trafficSystem.logs.unshift(entry);
      trafficSystem.logs = trafficSystem.logs.slice(0, 25);

      const list = $("#logList");
      list.innerHTML = trafficSystem.logs
        .map((line) => `<li class="log-item">${line}</li>`)
        .join("");
    }

    // ------------------------------------------------------------------
    // transitionLights(): Async handler for safe light transitions
    // ------------------------------------------------------------------
    async function transitionLights() {
      // This function uses async/await, which yields back to the event loop when
      // waiting (await sleep()). That allows the browser to process UI updates,
      // user input, and rendering frames in between each step.

      // Prevent concurrent transitions.
      if (trafficSystem.isTransitioning) {
        logEvent("Transition already in progress; request ignored.");
        return;
      }

      trafficSystem.isTransitioning = true;
      trafficSystem.pendingSwitch = false;

      // Determine which direction is currently green.
      const nsGreen = trafficSystem.intersections.ns.state === "green";
      const activeDir = nsGreen ? "ns" : "ew";
      const inactiveDir = nsGreen ? "ew" : "ns";

      logEvent(`Starting transition: ${trafficSystem.intersections[activeDir].name} → ${trafficSystem.intersections[inactiveDir].name}`);

      // 1) Yellow buffer for the active direction
      trafficSystem.intersections[activeDir].state = "yellow";
      trafficSystem.intersections[inactiveDir].state = "red";
      trafficSystem.lastTransition = `Yellow ${trafficSystem.intersections[activeDir].name}`;
      updateUI();

      // Wait 3 seconds before moving to red
      await sleep(3000);

      // 2) Set active direction to red; keep other direction red for 1 second
      trafficSystem.intersections[activeDir].state = "red";
      trafficSystem.lastTransition = `Red ${trafficSystem.intersections[activeDir].name}`;
      updateUI();

      await sleep(1000);

      // 3) Turn other direction green (exclusive state)
      trafficSystem.intersections[inactiveDir].state = "green";
      trafficSystem.lastTransition = `Green ${trafficSystem.intersections[inactiveDir].name}`;
      updateUI();
      logEvent(`Completed transition: ${trafficSystem.intersections[inactiveDir].name} is now GREEN`);

      trafficSystem.isTransitioning = false;

      // If user requested another switch during this transition, run again.
      if (trafficSystem.pendingSwitch) {
        logEvent("Processing queued switch request.");
        trafficSystem.pendingSwitch = false;
        await transitionLights();
      }
    }

    // ------------------------------------------------------------------
    // handleLogic(): Entry point for user-triggered actions
    // ------------------------------------------------------------------
    function handleLogic(action) {
      // This function is called by event listeners (clicks, etc.). It runs on the
      // main thread and may schedule async behavior via transitionLights().

      if (action === "switch") {
        // If a transition is already in progress, queue the request.
        if (trafficSystem.isTransitioning) {
          trafficSystem.pendingSwitch = true;
          logEvent("Switch requested during transition; queued.");
          updateUI();
          return;
        }

        transitionLights();
      }
    }

    // ------------------------------------------------------------------
    // init(): Set up initial state, attach event listeners, and start UI
    // ------------------------------------------------------------------
    function init() {
      // Initial state setup
      trafficSystem.intersections.ns.state = "green";
      trafficSystem.intersections.ew.state = "red";
      trafficSystem.isTransitioning = false;
      trafficSystem.pendingSwitch = false;
      trafficSystem.logs = [];
      trafficSystem.lastTransition = "Initialized";

      // Attach UI event listeners
      $("#btnSwitch").addEventListener("click", () => {
        handleLogic("switch");
      });

      // Render initial UI state
      updateUI();
      logEvent("Dashboard initialized.");

      // Keep footer time updated every second (demonstrates event loop tick behavior)
      setInterval(() => {
        $("#footerTime").textContent = formatTime();
      }, 1000);
    }

    // Kick off initialization when the DOM is ready.
    document.addEventListener("DOMContentLoaded", init);
  </script>
</body>
</html>
